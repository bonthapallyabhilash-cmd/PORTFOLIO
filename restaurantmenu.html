<!DOCTYPE html>
<html>
<head>
    <title>My Restaurant</title>
   <style>
  
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f5f5f5;
    background-image: linear-gradient(black,white,red);
}

#header{
    background-image:url("https://www.shutterstock.com/image-photo/assorted-chinese-food-on-dark-260nw-2650275223.jpg");
    background-size:cover;
    background-position:center;
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* Dark overlay */
.overlay{
    background:rgba(0,0,0,0.5);
    padding:40px;
    width:100%;
}

#header h1{
    font-size:50px;
    margin:0;
}

#header p{
    font-size:20px;
}

.section{
    width:80%;
    margin:auto;
    padding:20px;
}

.content{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.left img{
    border-radius:8px;
}

.left p{
    margin-left:20px;
    font-size:18px;
}

.right{
    font-size:18px;
    font-weight:bold;
    color:#e63946;
}
   </style>
</head>
<body>
    <div id="header">
        <div class="overlay">
        <h1 >A G restaurant</h1>
        <p>Enjoy your delicious meals<br>with a colour full Ambience</p>
        </div>
    </div>
    <div class="section">
        <h2 style="text-align: center;"><u>Menu</u></h2>
        <div class="content" class="section">
            <div class="left">
                <img src="https://holycowvegan.net/wp-content/uploads/2023/01/vegetable-biryani-3.jpg" alt="Veg biryani" style="width:80px;height:80px">
            </div>
         <div class="left">
            <p style="text-align: center;">Veg biryani is a delicious meal</p>
         </div>
         <div class="right">
            <p style="text-align: right;">&#8377;300</p>
         </div>
         
        </div>


        <div class="content" class="section">
            <div class="left">
                <img src="https://www.vegrecipesofindia.com/wp-content/uploads/2020/01/paneer-butter-masala-1.jpg" alt="Paneer" style="width:80px;height:80px">
            </div>
         <div class="left">
            <p style="text-align: center;">Paneer Butter Masala is a delicious curry</p>
         </div>
         <div class="right">
            <p style="text-align: right;">&#8377;250</p>
         </div>
         
        </div>


        <div class="content" class="section">
            <div class="left">
                <img src="https://www.wholesomeyum.com/wp-content/uploads/2023/02/wholesomeyum-Easy-Fried-Rice-2.jpg" alt="Fried rice" style="width:80px;height:80px">
            </div>
         <div class="left">
            <p style="text-align: center;">Fried Rice is a delicious meal</p>
         </div>
         <div class="right">
            <p style="text-align: right;">&#8377;180</p>
         </div>
         
        </div>
        

         <div class="content" class="section">
            <div class="left">
                <img src="https://www.indianhealthyrecipes.com/wp-content/uploads/2021/07/veg-manchurian.jpg" alt="Manchuria" style="width:80px;height:80px">
            </div>
         <div class="left">
            <p style="text-align: center;">Manchuria is a delicious stater</p>
         </div>
         <div class="right">
            <p style="text-align: right;">&#8377;150</p>
         </div>
         
        </div>
    </div>
</body>
</html>
